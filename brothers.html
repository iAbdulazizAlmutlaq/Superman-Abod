<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>استقامة</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --ink:#0C201D;
    --ink-deep:#071613;
    --surface:rgba(239,230,206,0.05);
    --surface-strong:rgba(239,230,206,0.09);
    --border:rgba(239,230,206,0.11);
    --border-strong:rgba(240,195,109,0.35);
    --honey:#D79A2C;
    --honey-light:#F0C36D;
    --berry:#B0546A;
    --emerald:#3FBF95;
    --emerald-light:#7EDCBB;
    --paper-text:#F6F0DD;
    --muted:rgba(246,240,221,0.58);
    --muted-2:rgba(246,240,221,0.34);
    --radius:20px;
    --radius-sm:13px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--ink);
    color:var(--paper-text);
    font-family:'Inter',sans-serif;
    -webkit-font-smoothing:antialiased;
    min-height:100vh;
    overflow-x:hidden;
    position:relative;
  }

  /* ---------- atmospheric background ---------- */
  .bg-layer{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none;}
  .blob{position:absolute;border-radius:50%;filter:blur(70px);opacity:0.55;}
  .blob-a{width:520px;height:520px;background:radial-gradient(circle, rgba(215,154,44,0.5), transparent 70%);top:-160px;left:-120px;animation:driftA 26s ease-in-out infinite;}
  .blob-b{width:480px;height:480px;background:radial-gradient(circle, rgba(63,191,149,0.32), transparent 70%);bottom:-180px;right:-140px;animation:driftB 32s ease-in-out infinite;}
  .blob-c{width:380px;height:380px;background:radial-gradient(circle, rgba(176,84,106,0.32), transparent 70%);top:35%;right:8%;animation:driftC 22s ease-in-out infinite;}
  @keyframes driftA{0%,100%{transform:translate(0,0);}50%{transform:translate(60px,40px);}}
  @keyframes driftB{0%,100%{transform:translate(0,0);}50%{transform:translate(-50px,-30px);}}
  @keyframes driftC{0%,100%{transform:translate(0,0);}50%{transform:translate(-40px,50px);}}
  .moon-glow{position:absolute;top:-60px;left:50%;transform:translateX(-50%);width:640px;height:640px;opacity:0.5;}
  .stars{position:absolute;inset:0;}
  .star{position:absolute;border-radius:50%;background:var(--honey-light);opacity:0.5;animation:twinkle 4s ease-in-out infinite;}
  @keyframes twinkle{0%,100%{opacity:0.15;}50%{opacity:0.8;}}
  @media(prefers-reduced-motion:reduce){
    .blob,.star,.fab{animation:none !important;}
    *{transition-duration:0.01ms !important;}
  }

  .wrap{max-width:640px;margin:0 auto;padding:26px 20px 100px;position:relative;z-index:1;}

  /* ---------- header / legend ---------- */
  header{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:26px;flex-wrap:wrap;}
  .legend{display:flex;gap:14px;font-size:12px;color:var(--muted);}
  .legend-item{display:flex;align-items:center;gap:6px;}
  .dot{width:8px;height:8px;border-radius:50%;display:inline-block;}
  .dot-abdullah{background:var(--honey-light);}
  .dot-abdulaziz{background:var(--emerald-light);}
  .meta{text-align:right;font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--muted-2);line-height:1.5;}
  .meta .hijri{color:var(--honey-light);}
  .sync-dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--muted-2);margin-right:5px;vertical-align:1px;}
  .sync-ok .sync-dot{background:var(--emerald);}
  .sync-error .sync-dot{background:var(--berry);}

  /* ---------- celebrate ---------- */
  .celebrate{background:linear-gradient(135deg, rgba(215,154,44,0.16), rgba(176,84,106,0.1));border:1px solid var(--border-strong);border-radius:var(--radius);padding:22px;margin-bottom:22px;text-align:center;backdrop-filter:blur(10px);}
  .celebrate .ar{font-family:'Amiri',serif;font-size:20px;color:var(--honey-light);margin:0 0 6px;}
  .celebrate p.msg{font-size:12.5px;color:var(--muted);margin:0 0 14px;line-height:1.6;}
  .btn-primary{background:var(--honey);color:var(--ink-deep);border:none;border-radius:999px;padding:10px 20px;font-weight:700;font-size:12.5px;cursor:pointer;font-family:'Inter',sans-serif;}

  /* ---------- freq sections ---------- */
  .freq-section{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);backdrop-filter:blur(16px);overflow:hidden;margin-bottom:14px;}
  .sec-head{width:100%;background:none;border:none;color:inherit;cursor:pointer;display:flex;align-items:center;justify-content:space-between;padding:16px 18px;font-family:inherit;}
  .sec-head:focus-visible{outline:2px solid var(--honey-light);outline-offset:-2px;}
  .sec-title{font-family:'Amiri',serif;font-weight:700;font-size:17px;color:var(--paper-text);display:flex;align-items:center;gap:10px;}
  .sec-title .caret{font-size:11px;color:var(--muted-2);transition:transform .3s ease;}
  .freq-section.collapsed .sec-title .caret{transform:rotate(-90deg);}
  .sec-frac{font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--muted);}

  .sec-body{display:grid;grid-template-rows:1fr;transition:grid-template-rows .32s ease;}
  .freq-section.collapsed .sec-body{grid-template-rows:0fr;}
  .sec-body-inner{overflow:hidden;padding:0 14px 14px;}

  .goal-row{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:10px 6px;border-top:1px solid rgba(239,230,206,0.06);flex-wrap:wrap;}
  .goal-row:first-child{border-top:none;}
  .goal-left{display:flex;align-items:center;gap:10px;min-width:0;}
  .goal-emoji{font-size:17px;flex:none;}
  .goal-name{font-size:13.5px;color:var(--paper-text);font-weight:500;}
  .goal-name button.q{background:none;border:none;color:var(--muted-2);font-size:11px;cursor:pointer;margin-left:6px;padding:0;text-decoration:underline;text-underline-offset:2px;}
  .goal-badge{font-family:'IBM Plex Mono',monospace;font-size:10.5px;color:var(--muted);background:rgba(10,33,29,0.4);border:1px solid rgba(239,230,206,0.14);border-radius:999px;padding:3px 8px;margin-right:2px;}

  .controls{display:flex;gap:6px;flex:none;}
  .pdot{width:22px;height:22px;border-radius:50%;border:2px solid rgba(239,230,206,0.25);background:none;cursor:pointer;padding:0;transition:all .18s ease;}
  .pdot.p-abdullah{border-color:rgba(240,195,109,0.5);}
  .pdot.p-abdulaziz{border-color:rgba(126,220,187,0.5);}
  .pdot.p-abdullah.on{background:var(--honey);border-color:var(--honey-light);box-shadow:0 0 8px rgba(240,195,109,0.5);}
  .pdot.p-abdulaziz.on{background:var(--emerald);border-color:var(--emerald-light);box-shadow:0 0 8px rgba(63,191,149,0.5);}
  .pdot:focus-visible{outline:2px solid var(--honey-light);outline-offset:2px;}

  .ppill{font-family:'IBM Plex Mono',monospace;font-size:10.5px;border-radius:999px;padding:4px 8px;cursor:pointer;background:rgba(10,33,29,0.4);transition:all .18s ease;}
  .ppill.p-abdullah{border:1.5px solid rgba(240,195,109,0.4);color:var(--honey-light);}
  .ppill.p-abdulaziz{border:1.5px solid rgba(126,220,187,0.4);color:var(--emerald-light);}
  .ppill.reached.p-abdullah{background:rgba(215,154,44,0.18);border-color:var(--honey-light);}
  .ppill.reached.p-abdulaziz{background:rgba(63,191,149,0.18);border-color:var(--emerald-light);}
  .ppill:focus-visible{outline:2px solid var(--honey-light);outline-offset:2px;}

  .info-panel{display:none;font-size:11.5px;color:var(--muted);line-height:1.6;background:rgba(10,33,29,0.5);border-radius:10px;padding:11px 13px;margin:2px 0 8px;width:100%;}
  .info-panel.show{display:block;}
  .info-panel strong{color:var(--paper-text);}

  .sec-add-row{margin-top:4px;}
  .sec-add{background:none;border:1px dashed rgba(239,230,206,0.22);color:var(--muted);border-radius:10px;padding:7px 0;width:100%;font-size:11.5px;cursor:pointer;font-family:'Inter',sans-serif;transition:all .18s ease;}
  .sec-add:hover{border-color:var(--honey-light);color:var(--honey-light);}

  .mini-form{display:none;margin-top:8px;background:rgba(10,33,29,0.4);border-radius:10px;padding:10px;}
  .mini-form.show{display:block;}
  .mini-form input{width:100%;background:rgba(10,33,29,0.6);border:1px solid rgba(239,230,206,0.16);color:var(--paper-text);border-radius:7px;padding:7px 9px;font-size:12.5px;font-family:'Inter',sans-serif;margin-bottom:7px;}
  .mini-form .row2{display:grid;grid-template-columns:2fr 1fr;gap:7px;}
  .mini-form-actions{display:flex;gap:8px;margin-top:2px;}
  .btn-mini{flex:1;border-radius:8px;padding:7px 0;font-size:11.5px;cursor:pointer;font-family:'Inter',sans-serif;border:none;font-weight:600;}
  .btn-mini.save{background:var(--honey);color:var(--ink-deep);}
  .btn-mini.cancel{background:none;border:1px solid rgba(239,230,206,0.18);color:var(--muted);}
  .remove-x{background:none;border:none;color:var(--muted-2);cursor:pointer;font-size:15px;padding:2px 4px;flex:none;}
  .remove-x:hover{color:var(--berry);}

  footer{text-align:center;margin-top:36px;font-size:11.5px;color:var(--muted-2);position:relative;z-index:1;}
  footer .ar{font-family:'Amiri',serif;font-style:italic;color:var(--muted);font-size:14px;}
  ::selection{background:var(--honey);color:var(--ink-deep);}

  /* ---------- FAB ---------- */
  .fab{
    position:fixed;right:20px;bottom:20px;width:56px;height:56px;border-radius:50%;
    background:linear-gradient(145deg, var(--honey), #b97e1f);border:none;cursor:pointer;
    box-shadow:0 6px 20px rgba(215,154,44,0.45);
    display:flex;align-items:center;justify-content:center;z-index:20;
    animation:fabPulse 3.5s ease-in-out infinite;
  }
  .fab svg{width:24px;height:24px;}
  @keyframes fabPulse{0%,100%{box-shadow:0 6px 20px rgba(215,154,44,0.45);}50%{box-shadow:0 6px 28px rgba(215,154,44,0.75);}}
  .fab:focus-visible{outline:2px solid var(--paper-text);outline-offset:3px;}

  /* ---------- modal ---------- */
  .modal-backdrop{
    display:none;position:fixed;inset:0;background:rgba(4,12,10,0.72);backdrop-filter:blur(6px);
    z-index:30;align-items:center;justify-content:center;padding:20px;
  }
  .modal-backdrop.show{display:flex;}
  .modal{
    background:linear-gradient(180deg, #163732, #0F2B27);border:1px solid var(--border-strong);
    border-radius:var(--radius);padding:28px 24px 24px;max-width:440px;width:100%;
    position:relative;max-height:88vh;overflow-y:auto;
  }
  .modal-close{position:absolute;top:14px;right:14px;background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer;padding:4px;}
  .modal-close:hover{color:var(--paper-text);}
  .modal-eyebrow{font-family:'IBM Plex Mono',monospace;font-size:13px;color:var(--honey-light);text-align:center;margin:0 0 20px;}
  .modal-eyebrow b{font-family:'Amiri',serif;font-size:26px;color:var(--paper-text);font-weight:700;margin-right:4px;}
  .chain{position:relative;display:flex;justify-content:space-between;align-items:center;padding:0 4px;height:34px;margin-bottom:22px;}
  .chain::before{content:"";position:absolute;left:2px;right:2px;top:50%;height:1.5px;background:linear-gradient(90deg, rgba(240,195,109,0.3), rgba(240,195,109,0.08));transform:translateY(-50%);}
  .bead{position:relative;width:13px;height:13px;border-radius:50%;background:var(--ink-deep);border:2px solid rgba(239,230,206,0.28);opacity:0.55;transition:all .25s ease;}
  .bead.half{background:rgba(215,154,44,0.4);border-color:var(--honey);opacity:0.85;}
  .bead.full{background:var(--honey);border-color:var(--honey-light);opacity:1;box-shadow:0 0 12px rgba(240,195,109,0.6);}
  .bead.today{transform:scale(1.4);}
  .bead.today::after{content:"";position:absolute;inset:-6px;border-radius:50%;border:1px solid rgba(240,195,109,0.55);}
  @media(max-width:480px){.bead{width:9px;height:9px;}}
  .modal-stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .mstat{background:rgba(239,230,206,0.04);border:1px solid rgba(239,230,206,0.09);border-radius:var(--radius-sm);padding:13px 14px;}
  .mstat .num{font-family:'IBM Plex Mono',monospace;font-size:20px;color:var(--honey-light);}
  .mstat .label{font-size:10.5px;color:var(--muted);margin-top:2px;}
</style>
</head>
<body>

<div class="bg-layer" aria-hidden="true">
  <div class="blob blob-a"></div>
  <div class="blob blob-b"></div>
  <div class="blob blob-c"></div>
  <svg class="moon-glow" viewBox="0 0 200 200"><defs><radialGradient id="mg" cx="50%" cy="35%" r="60%"><stop offset="0%" stop-color="#F0C36D" stop-opacity="0.28"/><stop offset="100%" stop-color="#F0C36D" stop-opacity="0"/></radialGradient></defs><circle cx="100" cy="70" r="100" fill="url(#mg)"/></svg>
  <div class="stars" id="starField"></div>
</div>

<div class="wrap">
  <header>
    <div class="legend">
      <span class="legend-item"><i class="dot dot-abdullah"></i>Abdullah</span>
      <span class="legend-item"><i class="dot dot-abdulaziz"></i>Abdulaziz</span>
    </div>
    <div class="meta" id="metaBlock"></div>
  </header>

  <div id="celebrateSlot"></div>

  <div id="sections"></div>

  <footer>
    <p class="ar">وَقُلِ اعْمَلُوا فَسَيَرَى اللَّهُ عَمَلَكُمْ</p>
  </footer>
</div>

<button class="fab" id="progressBtn" aria-label="View progress" title="View progress">
  <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M20 14.5A8.5 8.5 0 1 1 9.5 4a7 7 0 0 0 10.5 10.5Z" fill="#0C201D"/>
  </svg>
</button>

<div class="modal-backdrop" id="modalBackdrop">
  <div class="modal" id="modalCard" role="dialog" aria-modal="true" aria-label="Progress">
    <button class="modal-close" id="modalClose" aria-label="Close">&times;</button>
    <p class="modal-eyebrow"><b id="mDayNum">1</b>of <span id="mCycleLen">14</span></p>
    <div class="chain" id="beadChain"></div>
    <div class="modal-stats" id="modalStats"></div>
  </div>
</div>

<script>
/* ================= config ================= */
const SUPABASE_URL = 'https://vfvezytnburfurmuadhu.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZmdmV6eXRuYnVyZnVybXVhZGh1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQwMTU1MjgsImV4cCI6MjA5OTU5MTUyOH0.i3hbYnY19dRuIkhoQdSlNEjTk_5VzzafmWPCy-FzNu8';
const ROW_ID = 'shared';
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const PEOPLE = ['abdullah','abdulaziz'];
const HIJRI_MONTHS = ['Muharram','Safar',"Rabi' I","Rabi' II",'Jumada I','Jumada II','Rajab',"Sha'ban",'Ramadan','Shawwal',"Dhul Qi'dah",'Dhul Hijjah'];
const SECTIONS = [
  {key:'daily', label:'Daily', match: h=>h.freq==='daily'},
  {key:'weekly', label:'Weekly', match: h=>h.freq==='weekly'},
  {key:'monthly', label:'Monthly', match: h=>h.freq==='monthly-hijri' || h.freq==='monthly-day'}
];

let state = null;
let collapsedSections = {daily:false, weekly:false, monthly:false};
let modalOpen = false;

/* ================= date / hijri helpers ================= */
function pad(n){return String(n).padStart(2,'0');}
function dateKey(d){return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());}
function todayDate(){const d=new Date();d.setHours(0,0,0,0);return d;}
function addDays(d,n){const r=new Date(d);r.setDate(r.getDate()+n);return r;}
function daysBetween(a,b){return Math.round((b-a)/86400000);}
function weekStart(d){const r=new Date(d);r.setDate(r.getDate()-r.getDay());return r;}

function gregorianToJDN(y,m,d){
  const a=Math.floor((14-m)/12);
  const y2=y+4800-a;
  const m2=m+12*a-3;
  return d+Math.floor((153*m2+2)/5)+365*y2+Math.floor(y2/4)-Math.floor(y2/100)+Math.floor(y2/400)-32045;
}
function islamicFromJDN(jdn){
  let l=jdn-1948440+10632+1;
  let n=Math.floor((l-1)/10631);
  l=l-10631*n+354;
  let j=(Math.floor((10985-l)/5316))*(Math.floor((50*l)/17719))+(Math.floor(l/5670))*(Math.floor((43*l)/15238));
  l=l-(Math.floor((30-j)/15))*(Math.floor((17719*j)/50))-(Math.floor(j/16))*(Math.floor((15238*j)/43))+29;
  const month=Math.floor((24*l)/709);
  const day=l-Math.floor((709*month)/24);
  const year=30*n+j-30;
  return {year,month,day};
}
function toHijri(d){return islamicFromJDN(gregorianToJDN(d.getFullYear(),d.getMonth()+1,d.getDate()));}
function findNextHijri17(fromDate){
  for(let i=0;i<45;i++){
    const d=addDays(fromDate,i);
    const h=toHijri(d);
    if(h.day===17) return {date:d,hijri:h};
  }
  return null;
}
function hijriPeriodKey(h){return h.year+'-'+h.month;}

/* ================= state ================= */
function defaultState(){
  const today=todayDate();
  return {
    habits:[
      {id:'honey', name:'Honey', emoji:'🍯', freq:'daily', builtin:true},
      {id:'blackseed', name:'Black Seed', emoji:'🌿', freq:'daily', builtin:true},
      {id:'zamzam', name:'Zamzam Water', emoji:'💧', freq:'daily', builtin:true},
      {id:'costus', name:'Indian Costus', emoji:'🪵', freq:'weekly', target:2, builtin:true},
      {id:'cupping', name:'Cupping (Hijama)', emoji:'🔥', freq:'monthly-hijri', hijriDay:17, builtin:true}
    ],
    checkins:{},
    cycle:{start: dateKey(today), length:14},
    cyclesCompleted:0
  };
}
function mergeWithDefaults(parsed){
  const d = defaultState();
  return Object.assign(d, parsed, {habits: parsed.habits || d.habits, checkins: parsed.checkins || {}});
}

async function loadState(){
  try{
    const {data, error} = await sb.from('tracker_state').select('data').eq('id', ROW_ID).single();
    if(error || !data){
      const fresh = defaultState();
      await sb.from('tracker_state').upsert({id: ROW_ID, data: fresh, updated_at: new Date().toISOString()});
      setSyncStatus('ok');
      return fresh;
    }
    setSyncStatus('ok');
    return mergeWithDefaults(data.data);
  }catch(e){
    console.error('load error', e);
    setSyncStatus('error');
    return defaultState();
  }
}
let saveTimer=null;
function saveState(){
  setSyncStatus('saving');
  clearTimeout(saveTimer);
  saveTimer=setTimeout(async ()=>{
    try{
      const {error} = await sb.from('tracker_state').upsert({id: ROW_ID, data: state, updated_at: new Date().toISOString()});
      if(error) throw error;
      setSyncStatus('ok');
    }catch(e){
      console.error('save error', e);
      setSyncStatus('error');
    }
  }, 250);
}
function setSyncStatus(s){
  const el=document.getElementById('metaBlock');
  if(!el) return;
  el.dataset.sync=s;
  renderMeta();
}
function subscribeRealtime(){
  sb.channel('tracker_state_changes')
    .on('postgres_changes', {event:'*', schema:'public', table:'tracker_state', filter:`id=eq.${ROW_ID}`}, payload=>{
      if(payload.new && payload.new.data){
        state = mergeWithDefaults(payload.new.data);
        render();
      }
    })
    .subscribe();
}

/* ================= checkin helpers ================= */
function getEntry(habitId, periodKey){
  if(!state.checkins[habitId]) state.checkins[habitId]={};
  if(!state.checkins[habitId][periodKey]) state.checkins[habitId][periodKey]={abdullah:false, abdulaziz:false};
  return state.checkins[habitId][periodKey];
}
function toggleBool(habitId, periodKey, person){
  const e=getEntry(habitId, periodKey);
  e[person]=!e[person];
  saveState(); render();
}
function cycleWeekly(habitId, periodKey, person, target){
  const e=getEntry(habitId, periodKey);
  const cur=e[person]||0;
  e[person]=(cur+1)>target?0:cur+1;
  saveState(); render();
}

/* ================= cycle / completion math ================= */
function dailyIds(){
  return state.habits.filter(h=>h.freq==='daily').map(h=>h.id);
}
function dayCompletion(dateStr){
  const ids=dailyIds();
  if(ids.length===0) return 0;
  let both=0, any=0;
  ids.forEach(id=>{
    const e=state.checkins[id] && state.checkins[id][dateStr];
    if(e){
      if(e.abdullah && e.abdulaziz) both++;
      else if(e.abdullah || e.abdulaziz) any++;
    }
  });
  if(both===ids.length) return 2;
  if(both>0||any>0) return 1;
  return 0;
}
function cycleStatus(){
  const start=new Date(state.cycle.start);
  const today=todayDate();
  const length=state.cycle.length;
  const rawDay=daysBetween(start,today)+1;
  const dayNum=Math.min(Math.max(rawDay,1),length);
  const complete=rawDay>length;
  return {start, today, length, dayNum, complete};
}

/* ================= rendering ================= */
function render(){
  renderMeta();
  renderCelebrate();
  renderSections();
  if(modalOpen) renderModal();
}

function renderMeta(){
  const el=document.getElementById('metaBlock');
  const today=todayDate();
  const h=toHijri(today);
  const sync=el.dataset.sync||'saving';
  const label = sync==='ok'?'Synced':sync==='saving'?'Saving…':'Offline';
  el.innerHTML = `<div class="hijri">${h.day} ${HIJRI_MONTHS[h.month-1]} ${h.year}h</div>
    <div class="sync-${sync}"><span class="sync-dot"></span>${label}</div>`;
}

function renderCelebrate(){
  const slot=document.getElementById('celebrateSlot');
  const cs = cycleStatus();
  if(!cs.complete){ slot.innerHTML=''; return; }
  let filled=0;
  for(let i=0;i<cs.length;i++) if(dayCompletion(dateKey(addDays(cs.start,i)))===2) filled++;
  const pct=Math.round((filled/cs.length)*100);
  slot.innerHTML=`<div class="celebrate">
    <p class="ar">بارك الله فيكما</p>
    <p class="msg">${cs.length} days done, ${pct}% together. Time for the next goal.</p>
    <button class="btn-primary" id="nextCycleBtn">Start next cycle</button>
  </div>`;
  document.getElementById('nextCycleBtn').onclick=()=>{
    state.cycle.start=dateKey(todayDate());
    state.cyclesCompleted=(state.cyclesCompleted||0)+1;
    saveState(); render();
  };
}

/* ---- goal row rendering ---- */
function personControlsHTML(h, periodKey){
  if(h.freq==='weekly'){
    const e=(state.checkins[h.id] && state.checkins[h.id][periodKey]) || {abdullah:0,abdulaziz:0};
    return PEOPLE.map(p=>{
      const val=e[p]||0;
      return `<button class="ppill p-${p}${val>=h.target?' reached':''}" data-habit="${h.id}" data-period="${periodKey}" data-person="${p}" data-kind="week" data-target="${h.target}" title="${p}">${val}/${h.target}</button>`;
    }).join('');
  }
  const e=state.checkins[h.id] && state.checkins[h.id][periodKey];
  return PEOPLE.map(p=>{
    const on = e && e[p];
    return `<button class="pdot p-${p}${on?' on':''}" data-habit="${h.id}" data-period="${periodKey}" data-person="${p}" data-kind="bool" title="${p}" aria-label="${p} — ${h.name}"></button>`;
  }).join('');
}

function goalRowHTML(h){
  const today=dateKey(todayDate());
  const wk=dateKey(weekStart(todayDate()));

  if(h.freq==='daily'){
    return `<div class="goal-row">
      <div class="goal-left"><span class="goal-emoji">${h.emoji}</span><span class="goal-name">${h.name}</span></div>
      <div class="controls">${personControlsHTML(h, today)}</div>
      ${removeBtn(h)}
    </div>`;
  }
  if(h.freq==='weekly'){
    const infoBtn = h.id==='costus' ? `<button class="q" data-info-toggle="costus">why this amount?</button>` : '';
    return `<div class="goal-row">
      <div class="goal-left"><span class="goal-emoji">${h.emoji}</span><span class="goal-name">${h.name}${infoBtn}</span></div>
      <div class="controls">${personControlsHTML(h, wk)}</div>
      ${removeBtn(h)}
      ${h.id==='costus' ? `<div class="info-panel" id="info-costus"><strong>Dose note:</strong> no formal clinical dose is established for Qust al-Hindi. Traditional use: about ¼ tsp (~1g) mixed with honey, once or twice a week. Source from a trusted supplier, avoid in pregnancy/breastfeeding, skip if allergic to ragweed, and check with a pharmacist if on medication.</div>` : ''}
    </div>`;
  }
  if(h.freq==='monthly-hijri'){
    const next=findNextHijri17(todayDate());
    if(!next) return '';
    const pkey=hijriPeriodKey(next.hijri);
    const daysAway=daysBetween(todayDate(), next.date);
    return `<div class="goal-row">
      <div class="goal-left"><span class="goal-emoji">${h.emoji}</span><span class="goal-name">${h.name}</span>
        <span class="goal-badge">${daysAway===0?'today':daysAway+'d'}</span></div>
      <div class="controls">${personControlsHTML(h, pkey)}</div>
    </div>`;
  }
  if(h.freq==='monthly-day'){
    const today2=todayDate();
    const mkey=today2.getFullYear()+'-'+(today2.getMonth()+1);
    return `<div class="goal-row">
      <div class="goal-left"><span class="goal-emoji">${h.emoji}</span><span class="goal-name">${h.name}</span>
        <span class="goal-badge">day ${h.dayOfMonth}</span></div>
      <div class="controls">${personControlsHTML(h, mkey)}</div>
      ${removeBtn(h)}
    </div>`;
  }
  return '';
}
function removeBtn(h){
  return h.builtin ? '' : `<button class="remove-x" data-remove="${h.id}" aria-label="Remove goal">&times;</button>`;
}

/* ---- section fraction (today / this week / this month) ---- */
function sectionFraction(sec){
  const habits = state.habits.filter(sec.match);
  if(habits.length===0) return null;
  const today=dateKey(todayDate());
  const wk=dateKey(weekStart(todayDate()));
  const today2=todayDate();
  const mkey=today2.getFullYear()+'-'+(today2.getMonth()+1);
  let done=0, total=0;
  habits.forEach(h=>{
    PEOPLE.forEach(p=>{
      total++;
      if(h.freq==='daily'){
        const e=state.checkins[h.id] && state.checkins[h.id][today];
        if(e && e[p]) done++;
      }else if(h.freq==='weekly'){
        const e=state.checkins[h.id] && state.checkins[h.id][wk];
        if(e && (e[p]||0) >= h.target) done++;
      }else if(h.freq==='monthly-hijri'){
        const next=findNextHijri17(todayDate());
        if(next){
          const pkey=hijriPeriodKey(next.hijri);
          const e=state.checkins[h.id] && state.checkins[h.id][pkey];
          if(e && e[p]) done++;
        }
      }else if(h.freq==='monthly-day'){
        const e=state.checkins[h.id] && state.checkins[h.id][mkey];
        if(e && e[p]) done++;
      }
    });
  });
  return {done, total};
}

/* ---- sections ---- */
function renderSections(){
  const wrap=document.getElementById('sections');
  wrap.innerHTML = SECTIONS.map(sec=>{
    const habits = state.habits.filter(sec.match);
    const collapsed = collapsedSections[sec.key];
    const frac = sectionFraction(sec);
    return `<section class="freq-section${collapsed?' collapsed':''}" data-sec="${sec.key}">
      <button class="sec-head" data-collapse="${sec.key}">
        <span class="sec-title"><span class="caret">▾</span>${sec.label}</span>
        <span class="sec-frac">${frac ? frac.done+'/'+frac.total : ''}</span>
      </button>
      <div class="sec-body">
        <div class="sec-body-inner">
          ${habits.map(goalRowHTML).join('')}
          <div class="sec-add-row">
            <button class="sec-add" data-add="${sec.key}">+ add goal</button>
            <div class="mini-form" id="form-${sec.key}">
              <input type="text" id="name-${sec.key}" placeholder="Goal name">
              ${sec.key==='weekly' ? `<div class="row2"><span></span><input type="number" id="extra-${sec.key}" placeholder="Times/week" value="3" min="1" max="7"></div>` : ''}
              ${sec.key==='monthly' ? `<div class="row2"><span></span><input type="number" id="extra-${sec.key}" placeholder="Day of month" value="1" min="1" max="28"></div>` : ''}
              <div class="mini-form-actions">
                <button class="btn-mini save" data-save="${sec.key}">Add</button>
                <button class="btn-mini cancel" data-cancel="${sec.key}">Cancel</button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>`;
  }).join('');
  bindSectionEvents();
}

function bindSectionEvents(){
  document.querySelectorAll('[data-collapse]').forEach(btn=>{
    btn.onclick=()=>{
      const k=btn.dataset.collapse;
      collapsedSections[k]=!collapsedSections[k];
      renderSections();
    };
  });
  document.querySelectorAll('.pdot, .ppill').forEach(btn=>{
    btn.onclick=(ev)=>{
      ev.stopPropagation();
      const {habit, period, person, kind, target}=btn.dataset;
      if(kind==='week') cycleWeekly(habit, period, person, Number(target));
      else toggleBool(habit, period, person);
    };
  });
  document.querySelectorAll('[data-info-toggle]').forEach(btn=>{
    btn.onclick=(ev)=>{
      ev.stopPropagation();
      const panel=document.getElementById('info-'+btn.dataset.infoToggle);
      if(panel) panel.classList.toggle('show');
    };
  });
  document.querySelectorAll('[data-remove]').forEach(btn=>{
    btn.onclick=(ev)=>{
      ev.stopPropagation();
      state.habits = state.habits.filter(h=>h.id!==btn.dataset.remove);
      saveState(); render();
    };
  });
  document.querySelectorAll('[data-add]').forEach(btn=>{
    btn.onclick=(ev)=>{
      ev.stopPropagation();
      const k=btn.dataset.add;
      document.getElementById('form-'+k).classList.add('show');
      btn.style.display='none';
    };
  });
  document.querySelectorAll('[data-cancel]').forEach(btn=>{
    btn.onclick=(ev)=>{
      ev.stopPropagation();
      const k=btn.dataset.cancel;
      document.getElementById('form-'+k).classList.remove('show');
      const addBtn=document.querySelector(`[data-add="${k}"]`);
      if(addBtn) addBtn.style.display='';
    };
  });
  document.querySelectorAll('[data-save]').forEach(btn=>{
    btn.onclick=(ev)=>{
      ev.stopPropagation();
      const k=btn.dataset.save;
      const name=document.getElementById('name-'+k).value.trim();
      if(!name) return;
      const extraInput = document.getElementById('extra-'+k);
      const extra = extraInput ? (Number(extraInput.value)||1) : 1;
      const habit={id:'g_'+Date.now(), name, emoji:'🌱', builtin:false};
      if(k==='daily') habit.freq='daily';
      else if(k==='weekly'){ habit.freq='weekly'; habit.target=Math.min(Math.max(extra,1),7); }
      else if(k==='monthly'){ habit.freq='monthly-day'; habit.dayOfMonth=Math.min(Math.max(extra,1),28); }
      state.habits.push(habit);
      saveState();
      render();
    };
  });
}

/* ================= modal / visual tracker ================= */
function openModal(){
  modalOpen = true;
  document.getElementById('modalBackdrop').classList.add('show');
  renderModal();
}
function closeModal(){
  modalOpen = false;
  document.getElementById('modalBackdrop').classList.remove('show');
}
function renderModal(){
  const cs = cycleStatus();
  document.getElementById('mDayNum').textContent = cs.dayNum;
  document.getElementById('mCycleLen').textContent = cs.length;

  const chain=document.getElementById('beadChain');
  chain.innerHTML='';
  for(let i=0;i<cs.length;i++){
    const d=addDays(cs.start,i);
    const c=d>cs.today?-1:dayCompletion(dateKey(d));
    const bead=document.createElement('div');
    bead.className='bead'+(c===2?' full':c===1?' half':'')+(dateKey(d)===dateKey(cs.today)?' today':'');
    bead.title=d.toLocaleDateString('en-GB',{day:'numeric',month:'short'});
    chain.appendChild(bead);
  }

  let full=0, tracked=0;
  for(let i=0;i<cs.length;i++){
    const d=addDays(cs.start,i);
    if(d>cs.today) continue;
    tracked++;
    if(dayCompletion(dateKey(d))===2) full++;
  }
  const pct = tracked ? Math.round((full/tracked)*100) : 0;

  document.getElementById('modalStats').innerHTML = `
    <div class="mstat"><div class="num">${pct}%</div><div class="label">Days both completed the daily three</div></div>
    <div class="mstat"><div class="num">${full}/${tracked}</div><div class="label">Full days this cycle</div></div>
    <div class="mstat"><div class="num">${state.cyclesCompleted||0}</div><div class="label">Cycles completed together</div></div>
    <div class="mstat"><div class="num">${cs.length-cs.dayNum}</div><div class="label">Days left in this cycle</div></div>
  `;
}

/* ================= starfield ================= */
function buildStars(){
  const field=document.getElementById('starField');
  let html='';
  for(let i=0;i<46;i++){
    const size=Math.random()*2+1;
    const top=Math.random()*100;
    const left=Math.random()*100;
    const delay=Math.random()*4;
    html+=`<span class="star" style="width:${size}px;height:${size}px;top:${top}%;left:${left}%;animation-delay:${delay}s;"></span>`;
  }
  field.innerHTML=html;
}

/* ================= boot ================= */
(async function init(){
  buildStars();
  state = await loadState();
  render();
  subscribeRealtime();

  document.getElementById('progressBtn').onclick = openModal;
  document.getElementById('modalClose').onclick = closeModal;
  document.getElementById('modalBackdrop').onclick = (ev)=>{
    if(ev.target.id==='modalBackdrop') closeModal();
  };
  document.addEventListener('keydown', (ev)=>{
    if(ev.key==='Escape' && modalOpen) closeModal();
  });
})();
</script>
</body>
